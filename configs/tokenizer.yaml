# Snapshot of the M1-calibrated tokenizer, for reference only.
#
# The actual source of truth is code, not this file: numeric family ranges
# live in src/lottiegpt/tokenizer/schema.py (NUMERIC_FAMILIES), and family
# selection has real conditional logic (e.g. a bare "s" key means different
# things under a transform vs. an ellipse vs. a trim path) that doesn't fit a
# flat YAML schema — see lottie_tokenizer.py's _classify_numeric /
# _property_family_for_key. This file is not loaded by any script; it exists
# so the calibrated numbers are visible without reading the code.
#
# Calibrated against 332 real animations (data/fixtures/sample_lottie.jsonl,
# regenerate via `python -m lottiegpt.data.download`) — see
# scripts/round_trip_check.py for the full per-family report.

vocab_size: 3915  # special(10) + keys(~50) + enums(~48) + numeric(~2895) + text_subvocab(1450)

numeric_families:
  position:      {kind: quant_float, range: [-3000, 3000], bins: 384}
  scale_pct:     {kind: quant_float, range: [-200, 500],   bins: 192}
  rotation_deg:  {kind: quant_float, range: [-1080, 1080], bins: 256}
  percent:       {kind: quant_float, range: [-50, 150],    bins: 128}
  color_channel: {kind: quant_float, range: [0, 1],        bins: 64}
  stroke_width:  {kind: quant_float, range: [0, 200],      bins: 96}
  easing:        {kind: quant_float, range: [-0.5, 1.5],   bins: 64}
  misc_scalar:   {kind: quant_float, range: [-50, 1000],   bins: 192}
  count_int:     {kind: exact_int,   range: [-5, 150]}
  time_frame:    {kind: exact_int,   range: [-100, 600]}
  frame_rate:    {kind: exact_int,   range: [8, 120]}

text_subvocab_size: 1450  # reserved range, populated by the SentencePiece text tokenizer in M4

max_seq_len_lottie: 8192   # covers ~72% of the fixture corpus losslessly (decided
                            # over raising further or shrinking the tokenizer —
                            # see configs/pretrain.yaml); the rest are filtered
                            # out of the training corpus, not truncated
max_seq_len_total: 8192    # pretrain uses the full window for Lottie tokens;
                            # finetune reserves ~1024 of it for the text prefix
                            # (configs/finetune.yaml's max_token_len: 7168)

# Re-measure this distribution on a larger sample once M2 actually tokenizes
# shards — 332 animations is enough to calibrate quantization ranges but is a
# small base for a p90/mean estimate.
