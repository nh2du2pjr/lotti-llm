model_config: configs/model_small.yaml
tokenizer_config: configs/tokenizer.yaml

dataset:
  hf_name: OmniLottie/MMLottie-2M
  hf_config: Lottie  # native subset only; SVG-derived subset deferred (M5)
  max_token_len: 8192  # ~72% of v1-supported animations fit losslessly; longer
                        # ones are filtered out of the corpus, not truncated
  val_fraction: 0.03
  split_by: id

# M2 smoke test defaults — override via --num-samples for M3 full run
num_samples: 30000

optim:
  lr: 3.0e-4
  weight_decay: 0.1
  betas: [0.9, 0.95]
  warmup_steps: 500
  grad_clip: 1.0

batch:
  # PROVISIONAL: 8192-token sequences are far more memory-hungry per sample
  # than the 1536 assumed when these defaults were first drafted. Re-tune
  # micro_batch_size against real GPU memory at the start of M2 — this is a
  # starting guess, not a measured value.
  micro_batch_size: 4
  grad_accum_steps: 32  # effective batch ~128

precision: bf16
max_steps: 5000
eval_every: 250
checkpoint_every_minutes: 20
checkpoint_dir: /content/drive/MyDrive/lotti-llm-artifacts/checkpoints/pretrain
keep_last_n_checkpoints: 3
