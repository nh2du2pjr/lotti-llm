model_config: configs/model_small.yaml
tokenizer_config: configs/tokenizer.yaml

dataset:
  hf_name: OmniLottie/MMLottie-2M
  hf_config: Lottie  # native subset only; SVG-derived subset deferred (M5)
  max_token_len: 8192  # ~72% of v1-supported animations fit losslessly; longer
                        # ones are filtered out of the corpus, not truncated
  val_fraction: 0.03
  split_by: id

# M2 smoke test defaults — override via --num-samples for M3 full run
num_samples: 30000

optim:
  lr: 3.0e-4
  weight_decay: 0.1
  betas: [0.9, 0.95]
  warmup_steps: 500
  grad_clip: 1.0

batch:
  # Measured against the real card (RTX PRO 6000 Blackwell, 96GB) at M3
  # kickoff: micro_batch_size 16/24/32 used 39.6/59.1/78.7GB peak. 24 leaves
  # ~36GB headroom for eval-time generation + allocator fragmentation,
  # rather than running the training step itself at ~83% of the card.
  micro_batch_size: 24
  grad_accum_steps: 6  # effective batch 144

precision: bf16
max_steps: 5000
eval_every: 250
checkpoint_every_minutes: 20
checkpoint_dir: /content/drive/MyDrive/lotti-llm-artifacts/checkpoints/pretrain
keep_last_n_checkpoints: 3
