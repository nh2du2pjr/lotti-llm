# ~33M parameter decoder-only transformer (see plan for param math)
vocab_size: 3916  # calibrated in M1, see configs/tokenizer.yaml (bumped from
                   # 3915 after "ml2" was added to schema.STRUCTURAL_KEYS)
d_model: 512
n_layer: 10
n_head: 8
ffn_dim: 2048
max_seq_len: 8192  # covers ~72% of animations losslessly (p50=3813, p90=19588,
                    # mean=7849 on the 332-sample fixture); the rest are
                    # filtered out of the training corpus rather than
                    # truncated (see data.filter — truncation would teach the
                    # model that incomplete JSON is normal output)
dropout: 0.0
tie_embeddings: true
rope: true
